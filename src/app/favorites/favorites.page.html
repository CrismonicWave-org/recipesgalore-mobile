<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Favorites
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Favorites</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Empty State -->
  <div class="empty-state">
    <div class="empty-icon">❤️</div>
    <h2>No Favorites Yet</h2>
    <p class="empty-text">
      Recipes you love will appear here. Start exploring and 
      tap the heart to save your favorites!
    </p>
    <ion-button color="primary" disabled>
      Browse Recipes
    </ion-button>
  </div>
</ion-content>
