<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Profile</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="avatar">
      <ion-icon name="person-circle" class="avatar-icon"></ion-icon>
    </div>
    <h2>Guest User</h2>
    <p class="subtitle">Sign in to save your favorites</p>
  </div>

  <!-- Settings List -->
  <ion-list class="settings-list">
    <ion-list-header>
      <ion-label>Settings</ion-label>
    </ion-list-header>

    <ion-item button disabled>
      <ion-icon name="notifications-outline" slot="start"></ion-icon>
      <ion-label>Notifications</ion-label>
      <ion-note slot="end">Coming Soon</ion-note>
    </ion-item>

    <ion-item button disabled>
      <ion-icon name="settings-outline" slot="start"></ion-icon>
      <ion-label>Preferences</ion-label>
      <ion-note slot="end">Coming Soon</ion-note>
    </ion-item>

    <ion-item button disabled>
      <ion-icon name="help-circle-outline" slot="start"></ion-icon>
      <ion-label>Help & Support</ion-label>
      <ion-note slot="end">Coming Soon</ion-note>
    </ion-item>

    <ion-item button disabled>
      <ion-icon name="information-circle-outline" slot="start"></ion-icon>
      <ion-label>About</ion-label>
      <ion-note slot="end">Coming Soon</ion-note>
    </ion-item>
  </ion-list>

  <!-- Version Info -->
  <div class="version-info">
    <img src="assets/recipes_galore_banner.svg" alt="RecipesGalore" class="footer-logo">
    <p class="app-name">RecipesGalore Mobile</p>
    <p class="version">Version {{ version }}</p>
  </div>
</ion-content>
